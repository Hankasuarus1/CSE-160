<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <br>
    <label>X1: <input type="number" id="x1Input"></label>
    <label>Y1: <input type="number" id="y1Input"></label>
    <br>
    <label>X2: <input type="number" id="x2Input"></label>
    <label>Y2: <input type="number" id="y2Input"></label>
    <br>
    <button onclick="handleDrawEvent()">Draw</button>
    <br>
    <select id="operationSelect">
      <option value="none">None</option>
      <option value="add">Add</option>
      <option value="sub">Subtract</option>
      <option value="mul">Multiply</option>
      <option value="div">Divide</option>
      <option value="magnitude">Magnitude</option>
      <option value="normalize">Normalize</option>
      <option value="angleBetween">Angle Between</option>
      <option value="area">Area</option>
    </select>
    <label>Scalar: <input type="number" id="scalarInput"></label>
    <br>
    <button onclick="handleDrawEvent()">Draw</button>
    <script src="lib/cuon-matrix-cse160.js"></script> 
    <script src="asg0.js"></script>
  </body>
</html>
